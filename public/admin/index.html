<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Diagnostic listener to see if the callback message arrives
    window.addEventListener('message', (event) => {
      console.log("Admin window received message from:", event.origin);
      console.log("Message data:", event.data);
      if (typeof event.data === 'string' && event.data.startsWith('authorization:')) {
        console.log("Handshake detected! CMS should be logging you in now...");
      }
    }, false);
  </script>
</body>
</html>
