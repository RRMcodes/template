<!DOCTYPE HTML>
<html>
	<head>
		<title>Blog Post | Regan Raj Maharjan</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="description" id="meta-description" content="Blog post by Regan Raj Maharjan" />
		<!-- Open Graph / Social -->
		<meta property="og:site_name" content="Regan Raj Maharjan" />
		<meta property="og:type" content="article" />
		<meta property="og:url" id="og-url" content="" />
		<meta property="og:title" id="og-title" content="Blog Post | Regan Raj Maharjan" />
		<meta property="og:description" id="og-description" content="Blog post by Regan Raj Maharjan" />
		<meta property="og:image" id="og-image" content="" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" id="tw-title" content="Blog Post | Regan Raj Maharjan" />
		<meta name="twitter:description" id="tw-description" content="Blog post by Regan Raj Maharjan" />
		<link rel="stylesheet" href="/assets/css/main.css" />
		<noscript><link rel="stylesheet" href="/assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
		<div id="wrapper">

			<!-- Header -->
			<header id="header">
				<a href="/" class="logo">← Back to Portfolio</a>
			</header>



			<!-- Main -->
			<div id="main">
				<section class="post" id="post-section">
					<header class="major">
						<span class="date" id="post-date"></span>
						<h1 id="post-title">Loading…</h1>
					</header>
					<div id="post-content">
						<p>Fetching content…</p>
					</div>
					<br/>
					<ul class="actions" style="margin-top: 2rem;">
						<li><a href="/#blog" class="button primary">← Return to Blogs</a></li>
					</ul>
				</section>
			</div>

			<!-- Copyright -->
			<div id="copyright">
				<ul>
					<li>&copy; Regan Raj Maharjan</li>
					<li>Design: <a href="https://html5up.net">HTML5 UP</a></li>
				</ul>
			</div>

		</div><!-- /#wrapper -->

		<!-- Scripts -->
		<script src="/assets/js/jquery.min.js"></script>
		<script src="/assets/js/jquery.scrollex.min.js"></script>
		<script src="/assets/js/jquery.scrolly.min.js"></script>
		<script src="/assets/js/browser.min.js"></script>
		<script src="/assets/js/breakpoints.min.js"></script>
		<script src="/assets/js/util.js"></script>
		<script src="/assets/js/main.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
		<script>
			const params = new URLSearchParams(window.location.search);
			let slug   = params.get('slug');

			// Fallback: If rewritten internally (e.g., via Vercel or local serve.json) 
			// the browser URL is /post/hello-world but without query parameters.
			if (!slug) {
				const pathParts = window.location.pathname.split('/');
				// e.g. ["", "post", "hello-world"]
				if (pathParts.includes('post')) {
					slug = pathParts[pathParts.indexOf('post') + 1];
				}
			}

			if (!slug) {
				document.getElementById('post-title').innerText   = 'No post specified.';
				document.getElementById('post-content').innerHTML = '<p><a href="/">Return to home</a></p>';
			} else {
				fetch(`/content/posts/${slug}.md`)
					.then(r => {
						if (!r.ok) throw new Error(`HTTP ${r.status}`);
						return r.text();
					})
					.then(markdown => {
						const fmRegex = /^---\r?\n([\s\S]+?)\r?\n---/;
						const match   = markdown.match(fmRegex);
						let title = slug;
						let date  = '';
						let image = '';
						let body  = markdown;

						if (match) {
							const fm = match[1];
							const t  = fm.match(/title:\s*"?([^"\r\n]+)"?/);
							const d  = fm.match(/date:\s*"?([^"\r\n]+)"?/);
							const img = fm.match(/image:\s*"?([^"\r\n]+)"?/);
							if (t) title = t[1].trim();
							if (d) date  = d[1].trim();
							if (img) image = img[1].trim();
							body = markdown.slice(match[0].length).trim();
						}

						document.title = `${title} | Regan Raj Maharjan`;
						
						// Build plain-text excerpt for meta tags
						const plainText = body.replace(/[#*`>\[\]!]/g, '').replace(/\n+/g, ' ').trim();
						const excerpt   = plainText.substring(0, 160);

						// Standard meta
						document.getElementById('meta-description').setAttribute('content', excerpt);

						// Open Graph
						document.getElementById('og-url').setAttribute('content', window.location.href);
						document.getElementById('og-title').setAttribute('content', `${title} | Regan Raj Maharjan`);
						document.getElementById('og-description').setAttribute('content', excerpt);
						if (image) document.getElementById('og-image').setAttribute('content', image);

						// Twitter Card
						document.getElementById('tw-title').setAttribute('content', `${title} | Regan Raj Maharjan`);
						document.getElementById('tw-description').setAttribute('content', excerpt);

						// Format date to human-friendly format
						let humanDate = date;
						try {
							if (date) {
								const d = new Date(date);
								if (!isNaN(d)) {
									humanDate = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
								}
							}
						} catch(e) {}

						document.getElementById('post-title').innerText   = title;
						document.getElementById('post-date').innerText    = humanDate;
						
						// Securely render Markdown
						const rawHtml = marked.parse(body);
						const safeHtml = DOMPurify.sanitize(rawHtml);
						document.getElementById('post-content').innerHTML = safeHtml;

						// Fix relative image paths so CMS-uploaded images render correctly
						document.querySelectorAll('#post-content img').forEach(img => {
							const src = img.getAttribute('src');
							if (src && !src.startsWith('http') && !src.startsWith('/')) {
								img.setAttribute('src', src);
							}
						});
					})
					.catch(err => {
						console.error("Error loading post:", err);
						document.getElementById('post-title').innerText   = 'Post not found';
						document.getElementById('post-content').innerHTML =
							`<p>Could not load the requested post. <a href="/index.html">Return to home</a></p>`;
					});
			}
		</script>
	</body>
</html>
